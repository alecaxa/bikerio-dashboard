<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BikeRio — Dashboard Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaf0;--muted:#7a8099;
    --accent:#4f8ef7;--accent2:#7c5cfc;
    --green:#34c77b;--red:#f05252;--amber:#f5a623;--teal:#2dd4bf;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 28px 60px;}

  header{display:flex;align-items:flex-end;justify-content:space-between;padding:40px 0 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:16px;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
  h1{font-size:32px;font-weight:300;letter-spacing:-0.02em;line-height:1.1;}
  h1 strong{font-weight:600;}
  .header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .badge{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:99px;border:1px solid var(--border2);color:var(--muted);letter-spacing:0.06em;}
  .badge.live{border-color:rgba(52,199,123,0.4);color:var(--green);}
  .badge.live::before{content:'● ';}

  /* loading */
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-msg{color:var(--red);font-family:var(--mono);font-size:12px;text-align:center;padding:20px;display:none;}

</style>
</head>
