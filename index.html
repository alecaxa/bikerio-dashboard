<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BikeRio — Dashboard Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaf0;--muted:#7a8099;
    --accent:#4f8ef7;--accent2:#7c5cfc;
    --green:#34c77b;--red:#f05252;--amber:#f5a623;--teal:#2dd4bf;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 28px 60px;}

  header{display:flex;align-items:flex-end;justify-content:space-between;padding:40px 0 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:16px;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
  h1{font-size:32px;font-weight:300;letter-spacing:-0.02em;line-height:1.1;}
  h1 strong{font-weight:600;}
  .header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .badge{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:99px;border:1px solid var(--border2);color:var(--muted);letter-spacing:0.06em;}
  .badge.live{border-color:rgba(52,199,123,0.4);color:var(--green);}
  .badge.live::before{content:'● ';}

  /* loading */
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-msg{color:var(--red);font-family:var(--mono);font-size:12px;text-align:center;padding:20px;display:none;}

  /* summary */
  .summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0;}
  .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;transition:border-color 0.2s;}
  .sum-card:hover{border-color:var(--border2);}
  .sum-card .label{font-size:11px;color:var(--muted);margin-bottom:6px;font-family:var(--mono);}
  .sum-card .val{font-size:26px;font-weight:500;letter-spacing:-0.02em;}
  .sum-card .sub{font-size:11px;margin-top:4px;color:var(--muted);}

  /* section label */
  .section-label{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}

  /* pillar grid */
  .pillar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
  .pillar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;cursor:pointer;transition:all 0.22s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;}
  .pillar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-color,var(--accent));opacity:0.6;transition:opacity 0.2s;}
  .pillar-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
  .pillar-card:hover::before{opacity:1;}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);font-size:16px;flex-shrink:0;}
  .card-arrow{font-size:16px;color:var(--muted);transition:color 0.2s,transform 0.2s;margin-top:2px;}
  .pillar-card:hover .card-arrow{color:var(--text);transform:translateX(2px);}
  .card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;margin-top:10px;}
  .card-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:14px;}
  .metrics-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .metric-mini{background:var(--surface2);border-radius:6px;padding:8px 10px;}
  .metric-mini .m-label{font-size:10px;color:var(--muted);margin-bottom:2px;font-family:var(--mono);}
  .metric-mini .m-val{font-size:14px;font-weight:500;}
  .metric-mini .m-trend{font-size:10px;margin-top:2px;}

  .up{color:var(--green);} .dn{color:var(--red);} .nt{color:var(--muted);}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.18s ease;}
  .overlay.open{display:flex;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:820px;max-height:88vh;overflow-y:auto;animation:slideUp 0.22s cubic-bezier(0.4,0,0.2,1);position:relative;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .modal-header{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;z-index:2;}
  .mh-left{display:flex;align-items:center;gap:12px;}
  .mh-icon{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .modal-header h2{font-size:16px;font-weight:500;}
  .close-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .close-btn:hover{background:rgba(255,255,255,0.1);color:var(--text);}
  .modal-body{padding:24px;}
  .modal-section-title{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .kpi-grid-modal{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .kpi-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
  .kpi-item .ki-label{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;line-height:1.4;}
  .kpi-item .ki-val{font-size:20px;font-weight:500;margin-bottom:4px;}
  .kpi-item .ki-trend{font-size:10px;margin-top:2px;}
  .trend-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .t-chip{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface);}
  .t-chip.jan{color:#7a8099;} .t-chip.fev{color:#adb5d0;}
  .t-chip.mar-g{color:var(--green);background:rgba(52,199,123,0.1);}
  .t-chip.mar-r{color:var(--red);background:rgba(240,82,82,0.1);}
  .t-chip.mar-n{color:var(--muted);}

  .alert-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(240,82,82,0.12);border:1px solid rgba(240,82,82,0.3);color:var(--red);font-size:11px;padding:3px 10px;border-radius:99px;font-family:var(--mono);}
  .ok-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(52,199,123,0.1);border:1px solid rgba(52,199,123,0.25);color:var(--green);font-size:11px;padding:3px 10px;border-radius:99px;font-family:var(--mono);}
  .chips-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}

  .last-update{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px;}

  @media(max-width:900px){.pillar-grid{grid-template-columns:repeat(2,1fr);}.kpi-grid-modal{grid-template-columns:repeat(2,1fr);}.summary-row{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.pillar-grid{grid-template-columns:1fr;}.summary-row{grid-template-columns:repeat(2,1fr);}.kpi-grid-modal{grid-template-columns:1fr 1fr;}}
  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Tembici · BikeRio · WCB</div>
      <h1>Dashboard <strong>Operacional</strong></h1>
      <div class="last-update" id="last-update"></div>
    </div>
    <div class="header-right">
      <span class="badge">Praça Rio de Janeiro</span>
      <span class="badge" id="badge-period">Carregando...</span>
      <span class="badge live" id="badge-mes">—</span>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <span style="font-family:var(--mono);font-size:12px;color:var(--muted);">Carregando dados da planilha...</span>
  </div>
  <div id="error-msg">Erro ao carregar dados. Verifique se a planilha está publicada corretamente.</div>
  <div id="dashboard" style="display:none;">
    <div class="summary-row" id="summary-row"></div>
    <div class="section-label">Pilares operacionais — clique para detalhes</div>
    <div class="pillar-grid" id="pillar-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="mh-left">
        <div class="mh-icon" id="modal-icon"></div>
        <h2 id="modal-title"></h2>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR8b_YlWEfdoYuqer6Jdb3ruawEeuCSPtN-7fepw0bK6Hah7Lnv9UbA57I9cXzjngSaXL2nSsAVkZL/pub?output=csv';

// Pillar config: key, label, icon, color, description, 4 highlight KPI indices (from their rows)
const PILLAR_CONFIG = {
  'WBR':                          { icon:'📊', color:'#4f8ef7', desc:'Visão consolidada semanal de operação, disponibilidade e segurança.' },
  'Planejamento e Gestão':        { icon:'📋', color:'#2dd4bf', desc:'CSAT, rupturas, receita de usuário e carrossibilidade.' },
  'Manutenção':                   { icon:'🔧', color:'#34c77b', desc:'Produtividade, disponibilidade de frotas e tempo de reparo.' },
  'Prevenção de Perdas e Controles': { icon:'🛡️', color:'#f5a623', desc:'Write-off, bikes missing, rastreamento GPS e alertas MIBI.' },
  'Estação':                      { icon:'🚉', color:'#a78bfa', desc:'EGT, disponibilidade, qualidade e ruptura por station off.' },
  'Logística':                    { icon:'🚛', color:'#38bdf8', desc:'Rebalanceamento, aderência Mfleet e movimentos por operador.' },
  'SST':                          { icon:'⚠️', color:'#f05252', desc:'Segurança do trabalho, acidentes próprios e taxa de gravidade.' },
  'Pessoas':                      { icon:'👥', color:'#7c5cfc', desc:'TurnOver, absenteísmo, custos de pessoal e produtividade.' },
};

// KPIs to highlight on each pillar card (indicator name substrings)
const HIGHLIGHT = {
  'WBR':                          ['Disponibilidade Geral','Ruptura < 2','EGM','Índice Acidentes'],
  'Planejamento e Gestão':        ['CSAT','Ruptura Geral','Receita Usuário','Bikes Ativas/Docks'],
  'Manutenção':                   ['Disponibilidade Ele','MTBF - Electric','Produtividade (EGM)','Bikes Paradas'],
  'Prevenção de Perdas e Controles': ['Write-Off mec','Bikes com mais','% Primeira viagem','Alertas MIBI'],
  'Estação':                      ['EGT','Produtividade (EGT)','Disponibilidade (EGT)','% Estações Off'],
  'Logística':                    ['% Aderência Geral','Movimentos Logísticos','Taxa Rebalanceamento','Controle Velocidade'],
  'SST':                          ['Índice Acidentes','Taxa de Gravidade','Dias de Afastamento','% Ocorrências Alto'],
  'Pessoas':                      ['TurnOver (%)','Attririon','Gross Income','Absenteísmo'],
};

// Alerts shown at top of modal
const ALERTS = {
  'SST':       [{ t:'alert', msg:'TFA+TFCA: 404 — investigar causa raiz' },{ t:'alert', msg:'Taxa Gravidade: 22.121' }],
  'Prevenção de Perdas e Controles': [{ t:'alert', msg:'Write-Off Mec. −39 em mar' },{ t:'alert', msg:'759 bikes +72h missing' },{ t:'ok', msg:'Custo operacional abaixo budget' }],
  'WBR':       [{ t:'ok', msg:'Disp. Geral +1,6pp' },{ t:'ok', msg:'Stockout −3,2pp' },{ t:'alert', msg:'Acidentes: 404' }],
};

// ── Formatting helpers ──
function isNum(v){ return !isNaN(parseFloat(v)) && v !== '' && v !== '-' && v !== null; }

function fmt(v, ind){
  if(v === null || v === undefined || v === '' || v === '-' || v === 'nan') return '—';
  const s = String(v).trim();
  if(s === '-' || s === '' || s.toLowerCase() === 'nan') return '—';
  // already formatted string (currency etc)
  if(s.startsWith('R$') || s.startsWith('-R$')) return s;
  const n = parseFloat(s);
  if(isNaN(n)) return s;
  // percentage indicators
  const pctKeys = ['ruptura','disponibilidade','aderência','stockout','write off / bikes','% bikes','% viagens','% primeira','% docks','% estações','% ruptura','% uso','% conform','% ocorrências','% aderência','turnover (%)','absenteísmo','attririon','produtividade (egm)','produtividade (egt)','disponibilidade (egm)','disponibilidade (egt)','qualidade (egm)','qualidade (egt)','alertas mibi','taxa funcionamento','tempo estação cheia'];
  const indLow = ind ? ind.toLowerCase() : '';
  if(pctKeys.some(k => indLow.includes(k))){
    return (n * 100).toFixed(1).replace('.',',') + '%';
  }
  // large integers
  if(Math.abs(n) >= 1000 && Number.isInteger(n)) return n.toLocaleString('pt-BR');
  // small decimals
  if(Math.abs(n) < 10 && !Number.isInteger(n)) return n.toFixed(3).replace('.',',');
  if(!Number.isInteger(n)) return n.toFixed(1).replace('.',',');
  return String(n);
}

function trend(jan, fev, mar){
  const j = parseFloat(jan), f = parseFloat(fev), m = parseFloat(mar);
  if(isNaN(m) || isNaN(f)) return 'nt';
  // for these indicators, lower is better
  const lowerBetter = ['ruptura','stockout','write-off','inop','manutenção','missing','afastamento','turnover','absenteísmo','attririon','alerta','velocidade','% docks','% estações','facilities','folha'];
  return 'nt'; // will be computed contextually per indicator in modal
}

function trendDir(jan, fev, mar, indName){
  const j = parseFloat(String(jan).replace(',','.')), 
        f = parseFloat(String(fev).replace(',','.')), 
        m = parseFloat(String(mar).replace(',','.'));
  if(isNaN(m) || isNaN(f)) return 'nt';
  const diff = m - f;
  if(Math.abs(diff) < 0.0001) return 'nt';
  const indLow = (indName||'').toLowerCase();
  const lowerBetter = ['ruptura','stockout','write-off','inop','tempo entre','média tempo manutenção','missing','afastamento','turnover','absenteísmo','attririon','alerta nível','% docks','% estações','facilities','folha','bikes paradas','bikes inop','controle veloc','tempo estação cheia','tempo médio entre alerta'];
  const isLB = lowerBetter.some(k => indLow.includes(k));
  if(isLB) return diff < 0 ? 'up' : 'dn';
  return diff > 0 ? 'up' : 'dn';
}

function trendNote(jan, fev, mar, indName){
  const j = parseFloat(String(jan).replace(',','.')),
        f = parseFloat(String(fev).replace(',','.')),
        m = parseFloat(String(mar).replace(',','.'));
  if(isNaN(m)) return '— sem dados';
  if(isNaN(f) && isNaN(j)) return '— sem histórico';
  const base = isNaN(f) ? j : f;
  const baseLabel = isNaN(f) ? 'jan' : 'fev';
  if(isNaN(base)) return '—';
  const diff = m - base;
  const pct = Math.abs(diff / base * 100).toFixed(1);
  const dir = diff > 0 ? '▲' : diff < 0 ? '▼' : '=';
  const label = diff > 0 ? '+' : '';
  // format diff
  const diffFmt = Math.abs(diff) >= 100 ? Math.round(Math.abs(diff)).toLocaleString('pt-BR') :
                  Math.abs(diff) >= 1 ? Math.abs(diff).toFixed(1).replace('.',',') :
                  (Math.abs(diff)*100).toFixed(1).replace('.',',') + 'pp';
  const td = trendDir(jan, fev, mar, indName);
  return `${dir} ${td === 'up' ? 'melhora' : td === 'dn' ? 'piora' : 'estável'} vs ${baseLabel}`;
}

// ── Parse CSV ──
function parseCSV(text){
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){ inQ=!inQ; }
      else if(line[i]===',' && !inQ){ cols.push(cur.trim()); cur=''; }
      else { cur+=line[i]; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// ── Build data from CSV rows ──
function buildData(rows){
  const pillarData = {};
  let currentPillar = '';
  // col indices (0-based): 1=pilar, 4=indicator, 8=bike_type, 17=JAN, 18=FEV, 19=MAR
  for(let i=0; i<rows.length; i++){
    const row = rows[i];
    const mayPilar = (row[1]||'').trim();
    if(mayPilar && !['nan','-','project',''].includes(mayPilar.toLowerCase())){
      currentPillar = mayPilar;
    }
    const ind = (row[4]||'').trim();
    if(!ind || ['nan','-','bikerio',''].includes(ind.toLowerCase())) continue;
    if(!currentPillar) continue;
    if(!pillarData[currentPillar]) pillarData[currentPillar] = [];
    pillarData[currentPillar].push({
      indicator: ind,
      jan: (row[17]||'').trim(),
      fev: (row[18]||'').trim(),
      mar: (row[19]||'').trim(),
    });
  }
  return pillarData;
}

// ── Detect months from header row ──
function detectPeriod(rows){
  for(const row of rows){
    const r = row.map(c => (c||'').trim().toUpperCase());
    const janIdx = r.findIndex(c => c.includes('JAN'));
    if(janIdx >= 0){
      const months = [];
      for(let i=janIdx; i<Math.min(janIdx+3, r.length); i++){
        if(r[i]) months.push(r[i].replace('.',''));
      }
      return months;
    }
  }
  return ['JAN','FEV','MAR'];
}

// ── Render summary ──
function renderSummary(pillarData){
  const wbr = pillarData['WBR'] || [];
  const sst = pillarData['SST'] || [];
  const pess = pillarData['Pessoas'] || [];
  const perd = pillarData['Prevenção de Perdas e Controles'] || [];

  const dispGeral = wbr.find(r => r.indicator === 'Disponibilidade Geral');
  const acidentes = sst.find(r => r.indicator === 'Índice Acidentes (TFA + TFCA)');
  const writeoff  = perd.find(r => r.indicator === 'Write-Off mec.');
  const turnover  = pess.find(r => r.indicator === 'TurnOver (%)');

  const dg = dispGeral ? fmt(dispGeral.mar,'disponibilidade') : '—';
  const dgTrend = dispGeral ? trendDir(dispGeral.jan, dispGeral.fev, dispGeral.mar, 'disponibilidade') : 'nt';
  const dgNote = dispGeral ? trendNote(dispGeral.jan, dispGeral.fev, dispGeral.mar, 'disponibilidade') : '';

  const ac = acidentes ? fmt(acidentes.mar,'') : '—';
  const acTrend = acidentes ? trendDir(acidentes.jan, acidentes.fev, acidentes.mar, 'acidentes') : 'nt';

  const wo = writeoff ? fmt(writeoff.mar,'') : '—';
  const woTrend = writeoff ? trendDir(writeoff.jan, writeoff.fev, writeoff.mar, 'write-off') : 'nt';

  const tv = turnover ? fmt(turnover.mar, 'turnover (%)') : '—';
  const tvTrend = turnover ? trendDir(turnover.jan, turnover.fev, turnover.mar, 'turnover') : 'nt';

  document.getElementById('summary-row').innerHTML = `
    <div class="sum-card"><div class="label">DISP. GERAL MAR</div><div class="val ${dgTrend}">${dg}</div><div class="sub">${dgNote}</div></div>
    <div class="sum-card"><div class="label">ÍNDICE ACIDENTES</div><div class="val ${acTrend}">${ac}</div><div class="sub">${trendNote(acidentes?.jan,acidentes?.fev,acidentes?.mar,'acidentes')}</div></div>
    <div class="sum-card"><div class="label">WRITE-OFF MEC. MAR</div><div class="val ${woTrend}">${wo}</div><div class="sub">${trendNote(writeoff?.jan,writeoff?.fev,writeoff?.mar,'write-off')}</div></div>
    <div class="sum-card"><div class="label">TURNOVER MAR</div><div class="val ${tvTrend}">${tv}</div><div class="sub">${trendNote(turnover?.jan,turnover?.fev,turnover?.mar,'turnover')}</div></div>
  `;
}

// ── Render pillar cards ──
function renderPillars(pillarData){
  const order = ['WBR','Planejamento e Gestão','Manutenção','Prevenção de Perdas e Controles','Estação','Logística','SST','Pessoas'];
  let html = '';
  for(const pilar of order){
    const cfg = PILLAR_CONFIG[pilar];
    if(!cfg || !pillarData[pilar]) continue;
    const rows = pillarData[pilar];
    const highlights = (HIGHLIGHT[pilar]||[]).map(h => rows.find(r => r.indicator.toLowerCase().includes(h.toLowerCase()))).filter(Boolean).slice(0,4);
    let miniHtml = '';
    for(const r of highlights){
      const v = fmt(r.mar, r.indicator);
      const td = trendDir(r.jan, r.fev, r.mar, r.indicator);
      const tn = trendNote(r.jan, r.fev, r.mar, r.indicator);
      const shortLabel = r.indicator.length > 22 ? r.indicator.slice(0,20)+'…' : r.indicator;
      miniHtml += `<div class="metric-mini"><div class="m-label">${shortLabel.toUpperCase()}</div><div class="m-val ${td}">${v}</div><div class="m-trend ${td}">${tn}</div></div>`;
    }
    html += `
      <div class="pillar-card" style="--card-color:${cfg.color}" onclick="openModal('${pilar.replace(/'/g,"\\'")}')">
        <div class="card-header"><div class="card-icon">${cfg.icon}</div><div class="card-arrow">→</div></div>
        <div class="card-name">${pilar}</div>
        <div class="card-desc">${cfg.desc}</div>
        <div class="metrics-mini">${miniHtml}</div>
      </div>`;
  }
  document.getElementById('pillar-grid').innerHTML = html;
}

// ── Render modal ──
let _pillarData = {};
function openModal(pilar){
  const rows = _pillarData[pilar] || [];
  const cfg = PILLAR_CONFIG[pilar] || { icon:'📌', color:'#888' };
  document.getElementById('modal-icon').textContent = cfg.icon;
  document.getElementById('modal-title').textContent = pilar;

  // alert chips
  let html = '';
  const alerts = ALERTS[pilar];
  if(alerts){
    html += '<div class="chips-row">';
    alerts.forEach(a => { html += `<span class="${a.t==='alert'?'alert-chip':'ok-chip'}">${a.t==='alert'?'⚠':'✓'} ${a.msg}</span>`; });
    html += '</div>';
  }

  html += '<div class="modal-section-title">Todos os indicadores — Jan · Fev · Mar</div>';
  html += '<div class="kpi-grid-modal">';
  for(const r of rows){
    if(['—','nan','-',''].includes((r.jan+r.fev+r.mar).replace(/—/g,'').trim()) && r.jan==='—'&&r.fev==='—'&&r.mar==='—') continue;
    const janF = fmt(r.jan, r.indicator);
    const fevF = fmt(r.fev, r.indicator);
    const marF = fmt(r.mar, r.indicator);
    const td = trendDir(r.jan, r.fev, r.mar, r.indicator);
    const tn = trendNote(r.jan, r.fev, r.mar, r.indicator);
    const marClass = td==='up'?'mar-g':td==='dn'?'mar-r':'mar-n';
    html += `
      <div class="kpi-item">
        <div class="ki-label">${r.indicator}</div>
        <div class="ki-val ${td}">${marF}</div>
        <div class="trend-row">
          <span class="t-chip jan">Jan ${janF}</span>
          <span class="t-chip fev">Fev ${fevF}</span>
          <span class="t-chip ${marClass}">Mar ${marF}</span>
        </div>
        <div class="ki-trend ${td}">${tn}</div>
      </div>`;
  }
  html += '</div>';

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeOnBg(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── Detect latest month label ──
function detectLatestMonth(rows){
  for(const row of rows){
    const r = row.map(c=>(c||'').trim().toUpperCase());
    const idx = r.findIndex(c=>c.match(/^(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)/));
    if(idx>=0){
      // find last non-empty month col
      let last = '';
      for(let i=idx;i<Math.min(idx+12,r.length);i++){
        if(r[i].match(/^(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)/)) last=r[i].replace('.','');
      }
      if(last) return last;
    }
  }
  return 'MAR 2026';
}

// ── MAIN: fetch CSV ──
async function init(){
  try {
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    const months = detectPeriod(rows);
    const latestMonth = months[months.length-1] || 'MAR';

    _pillarData = buildData(rows);

    document.getElementById('badge-period').textContent = months.join(' – ').replace(/\./g,'') + ' 2026';
    document.getElementById('badge-mes').textContent = latestMonth.replace('.','') + ' 2026';
    document.getElementById('last-update').textContent = 'Atualizado em: ' + new Date().toLocaleString('pt-BR');

    renderSummary(_pillarData);
    renderPillars(_pillarData);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = '';
  } catch(e){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Erro ao carregar dados: ' + e.message + '. Verifique se a planilha está publicada como CSV.';
    console.error(e);
  }
}

init();
</script>
